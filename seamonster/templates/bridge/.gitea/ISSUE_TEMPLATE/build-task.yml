name: "Build Task"
about: "A build work item for the Builder — feature, fix, or refactor"
labels:
  - "team/build"
body:
  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Background — why does this work need to happen? Link to the parent proposal or architecture decision."
      placeholder: "This is part of the auth module (see #42). The Architect decided on JWT with refresh tokens (#43)."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      description: "What must be true for this task to be considered complete? Be specific."
      placeholder: |
        - [ ] JWT tokens generated with RS256 signing
        - [ ] Access token expires in 15 minutes
        - [ ] Refresh token expires in 7 days
        - [ ] Token refresh endpoint returns new access token
        - [ ] All endpoints return proper error responses
        - [ ] Tests cover happy path and error cases
    validations:
      required: true

  - type: textarea
    id: contracts
    attributes:
      label: "Contracts (Input/Output Interfaces)"
      description: "If this is part of a multi-wave build, specify the exact interfaces — function signatures, types, API endpoints — that other waves depend on."
      placeholder: |
        Exports:
          - generateAccessToken(userId: string, roles: string[]): string
          - generateRefreshToken(userId: string): string
          - verifyToken(token: string): TokenPayload | null
          - authMiddleware: Express.Middleware

        Depends on:
          - User model from wave 1 (#44): { id: string, email: string, roles: string[] }
    validations:
      required: false

  - type: textarea
    id: upstream-downstream
    attributes:
      label: "Related Issues"
      description: "Issues that block this, or that this blocks. Use Gitea dependency syntax."
      placeholder: |
        Blocked by: #44 (user model)
        Blocks: #46 (API routes need auth middleware)
    validations:
      required: false

  - type: dropdown
    id: size
    attributes:
      label: "Size"
      description: "Estimated effort."
      options:
        - "Small (< 1 day)"
        - "Medium (1-3 days)"
        - "Large (3-5 days)"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "How urgent is this?"
      options:
        - "P0 — Critical path, blocks everything"
        - "P1 — Important, needed for milestone"
        - "P2 — Nice to have, can defer"
    validations:
      required: true
